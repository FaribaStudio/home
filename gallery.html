<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Fariba Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #af944d; --black: #1a1a1a; --white: #ffffff; --gray: #f9f9f9; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--white); }
        nav { display: flex; justify-content: space-between; padding: 25px 5%; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .logo { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 22px; text-decoration: none; color: black; }
        .nav-links a { text-decoration: none; color: var(--black); margin-left: 25px; font-size: 13px; font-weight: 600; }
        
        .gallery-header { text-align: center; padding: 60px 20px; background: var(--gray); }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; }
        
        .filter-nav { text-align: center; margin-bottom: 20px; }
        .filter-btn { margin: 0 15px; font-size: 12px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; color: #999; border: none; background: none; padding-bottom: 5px; }
        .filter-btn.active { color: var(--black); font-weight: 700; border-bottom: 2px solid var(--black); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; padding: 60px 5%; }
        .art-item { text-align: center; transition: 0.4s ease; }
        .art-item.hidden { display: none; }

        /* The Image Box */
        .art-item img { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 4 / 3; 
            object-fit: contain; 
            background: #fdfdfd; 
            border: 1px solid #eee;
            transition: 0.3s;
            cursor: zoom-in; /* Shows the zoom icon on hover */
        }
        .art-item img:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .art-item h3 { font-family: 'Playfair Display', serif; margin: 15px 0 5px; font-size: 20px; }
        .category-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 600; display: block; margin-bottom: 5px; }
        .price { color: var(--black); font-weight: 600; margin-top: 10px; }

        /* --- ZOOM MODAL (LIGHTBOX) --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 2000; 
            padding-top: 50px; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(255,255,255,0.98); /* Clean white background */
            cursor: zoom-out;
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 85vh;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .close {
            position: absolute;
            top: 20px; right: 35px;
            color: #000; font-size: 40px; font-weight: bold; cursor: pointer;
        }

        footer { padding: 40px; background: #111; color: #777; text-align: center; font-size: 12px; }
        
        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            /* Navigation: Stack links or center them */
            nav {
                flex-direction: column;
                padding: 15px;
            }
            .nav-links {
                margin-top: 15px;
            }
            .nav-links a {
                margin: 0 10px;
                font-size: 12px;
            }

            /* Hero Section: Shrink text so it fits */
            .hero h1 {
                font-size: 2.2rem !important;
            }
            .hero p {
                font-size: 1rem !important;
            }

            /* Grid Layouts: Force 1 column on small screens */
            .gallery-grid, 
            .contact-container,
            section { 
                grid-template-columns: 1fr !important; 
                padding: 40px 5% !important;
                gap: 30px !important;
            }

            /* Images: Adjust height for mobile viewing */
            .art-item img {
                height: auto !important;
                aspect-ratio: 1 / 1; /* Makes them nice squares on mobile */
            }

            /* Modal (Zoom): Make sure the zoomed image fits the screen */
            .modal-content {
                max-width: 95%;
                margin-top: 20%;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Fariba Studio</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gallery.html" style="color: var(--gold);">Gallery</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="gallery-header">
        <h1>The Collection</h1>
        <div class="filter-nav">
            <button class="filter-btn active" onclick="filterSelection('all')">All</button>
            <button class="filter-btn" onclick="filterSelection('canvas')">Original Canvases</button>
            <button class="filter-btn" onclick="filterSelection('card')">Greeting Cards</button>
        </div>
    </header>

    <main class="gallery-grid">
        <div class="art-item canvas">
            <span class="category-tag">Original Canvas</span>
            <img src="canvas/person2.jpg" alt="The Summer Parasol" onclick="openModal(this.src)">
            <h3>The Summer Parasol</h3>
            <p class="price">$850.00</p>
        </div>

        <div class="art-item card">
            <span class="category-tag">Greeting Card</span>
            <img src="greeting-cards/color1.png" alt="Card" onclick="openModal(this.src)">
            <h3>Sun-Drenched Siesta</h3>
            <p class="price">$20.00</p>
        </div>

        <div class="art-item card">
            <span class="category-tag">Greeting Card</span>
            <img src="greeting-cards/color2.png" alt="Card" onclick="openModal(this.src)">
            <h3>Loyal Companions</h3>
            <p class="price">$20.00</p>
        </div>

        <div class="art-item card">
            <span class="category-tag">Greeting Card</span>
            <img src="greeting-cards/color3.png" alt="Card" onclick="openModal(this.src)">
            <h3>Aegean Afternoon</h3>
            <p class="price">$25.00</p>
        </div>

        <div class="art-item card">
            <span class="category-tag">Greeting Card</span>
            <img src="greeting-cards/color4.png" alt="Card" onclick="openModal(this.src)">
            <h3>Emerald in Motion</h3>
            <p class="price">$25.00</p>
        </div>
    </main>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <footer>&copy; 2026 FARIBA STUDIO</footer>

    <script>
        // Filtering Logic
        function filterSelection(category) {
            const items = document.querySelectorAll('.art-item');
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(category) || (category === 'all' && btn.innerText === 'ALL')) btn.classList.add('active');
            });
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) item.classList.remove('hidden');
                else item.classList.add('hidden');
            });
        }

        // Lightbox Logic
        function openModal(src) {
            document.getElementById("myModal").style.display = "block";
            document.getElementById("img01").src = src;
        }
    </script>
</body>
</html>
